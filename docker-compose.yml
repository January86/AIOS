version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: aios-postgres
    environment:
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: aios
      POSTGRES_DB: aios
    ports:
      - "5432:5432"
    volumes:
      - aios_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aios-redis
    ports:
      - "6379:6379"
    volumes:
      - aios_redis_data:/data

volumes:
  aios_postgres_data:
  aios_redis_data:
